# Alembic 配置
# 使用方式:
#   alembic revision --autogenerate -m "描述"
#   alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
version_locations = %(here)s/alembic/versions

# 数据库 URL 由 env.py 动态读取，此处保留占位符
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
